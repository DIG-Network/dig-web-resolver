name: publish-npm

# Publish @dignetwork/dig-web-resolver to npm when a vX.Y.Z tag is pushed (the tag is
# cut by release.yml on merge, per CLAUDE.md §3.6 non-apps per-merge model), or on
# manual dispatch. Auth uses npm Trusted Publishing (OIDC) — this workflow exchanges a
# GitHub Actions OIDC token for a short-lived npm publish token via the npm CLI; no
# NPM_TOKEN secret is used or required. The npm-side trusted publisher must be
# configured for org DIG-Network, repo dig-web-resolver, workflow publish-npm.yml.
# This replaces the prior NPM_TOKEN path that failed with EOTP (2FA requirement) per
# issue #718.
on:
  push:
    tags: ["v*"]
  workflow_dispatch: {}

concurrency:
  group: npm-publish
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    name: build + npm publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: "https://registry.npmjs.org"
      - run: npm ci
      - name: Build bundles + types
        run: npm run build
      - name: upgrade npm (trusted publishing requires npm >= 11.5.1)
        run: |
          npm install -g npm@latest
          npm --version
      - name: Publish to npmjs
        run: npm publish --access public
